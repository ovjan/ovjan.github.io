<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<script src="https://st.max.ru/js/max-web-app.js"></script>
<title>Калькуляторы ремонта</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Manrope', sans-serif; background: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; overscroll-behavior: none; }

  /* ===== HEADER ===== */
  header {
    background: linear-gradient(135deg, #b91c1c, #dc2626);
    box-shadow: 0 4px 16px rgba(185,28,28,0.25);
    flex-shrink: 0;
    z-index: 50;
  }
  .header-inner {
    display: flex; align-items: center;
    max-width: 1280px; margin: 0 auto;
    height: 60px; padding: 0 20px;
  }
  .header-logo { height: 38px; width: auto; filter: brightness(0) invert(1); flex-shrink: 0; }
  .header-title {
    flex: 1; text-align: center;
    color: #fff; font-weight: 800;
    font-size: 13px; text-transform: uppercase;
    letter-spacing: 0.08em; line-height: 1.2;
  }
  .header-spacer { width: 38px; flex-shrink: 0; }

  /* ===== TABS BAR ===== */
  .tabs-bar {
    background: #fff;
    border-bottom: 1px solid #e2e2e4;
    flex-shrink: 0;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    z-index: 40;
    touch-action: pan-x;
    overscroll-behavior-x: contain;
  }
  .tabs-bar::-webkit-scrollbar { display: none; }
  .tabs-inner {
    display: flex;
    max-width: 1280px; margin: 0 auto;
    padding: 0 8px;
    min-width: max-content;
  }
  .tab-btn {
    display: flex; align-items: center; gap: 7px;
    padding: 0 20px; height: 52px;
    font-family: 'Manrope', sans-serif;
    font-size: 13px; font-weight: 700;
    color: #6b7280;
    background: none; border: none; cursor: pointer;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    position: relative; top: 1px;
    touch-action: manipulation;
  }
  .tab-btn:hover { color: #374151; }
  .tab-btn.active {
    color: #c0001a;
    border-bottom-color: #c0001a;
  }
  .tab-btn .tab-icon { font-size: 16px; line-height: 1; }
  .tab-btn .tab-badge {
    font-size: 9px; font-weight: 800;
    background: #e8e8ea; color: #6b7280;
    padding: 2px 6px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 0.05em;
    transition: background 0.15s, color 0.15s;
  }
  .tab-btn.active .tab-badge { background: #fff0f2; color: #c0001a; }

  /* ===== FRAMES ===== */
  .frames-container { flex: 1; overflow: hidden; position: relative; }
  .tab-frame { position: absolute; inset: 0; display: none; }
  .tab-frame.active { display: block; }
  .tab-frame iframe { width: 100%; height: 100%; border: none; display: block; }

  /* ===== FUTURE TAB PLACEHOLDER ===== */
  .tab-soon {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 16px; color: #9ca3af; background: #fafafa;
  }
  .tab-soon-icon { font-size: 48px; line-height: 1; }
  .tab-soon h2 { font-size: 20px; font-weight: 800; color: #374151; }
  .tab-soon p  { font-size: 14px; color: #9ca3af; text-align: center; max-width: 300px; line-height: 1.5; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <img src="logo_1.svg" alt="Логотип" class="header-logo">
    <div class="header-title" id="header-title">Калькуляторы ремонта</div>
    <div class="header-spacer"></div>
  </div>
</header>

<div class="tabs-bar">
  <div class="tabs-inner">
    <button class="tab-btn active" id="tab-btn-styazhka" onclick="showTab('styazhka')">
      <span class="tab-icon">&#127959;</span>
      Стяжка пола
    </button>
    <button class="tab-btn" id="tab-btn-shtukaturka" onclick="showTab('shtukaturka')">
      <span class="tab-icon">&#129529;</span>
      Штукатурка
    </button>
    <button class="tab-btn" id="tab-btn-napol" onclick="showTab('napol')">
      <span class="tab-icon">&#129717;</span>
      Напольные покрытия
    </button>
    <!-- Placeholder — будущие калькуляторы -->
    <button class="tab-btn" style="opacity:0.45;cursor:default" title="Скоро">
      <span class="tab-icon">&#128167;</span>
      Покраска
      <span class="tab-badge">Скоро</span>
    </button>
    <button class="tab-btn" style="opacity:0.45;cursor:default" title="Скоро">
      <span class="tab-icon">&#128336;</span>
      Потолок
      <span class="tab-badge">Скоро</span>
    </button>
    <button class="tab-btn" style="opacity:0.45;cursor:default" title="Скоро">
      <span class="tab-icon">&#128297;</span>
      Сантехника
      <span class="tab-badge">Скоро</span>
    </button>
  </div>
</div>

<div class="frames-container">
  <div class="tab-frame active" id="frame-styazhka">
    <iframe src="styazhka-pola-v2.html?embed=1" id="iframe-styazhka" title="Стяжка пола"></iframe>
  </div>
  <div class="tab-frame" id="frame-shtukaturka">
    <iframe src="shtukaturka.html?embed=1" id="iframe-shtukaturka" title="Штукатурка" loading="lazy"></iframe>
  </div>
  <div class="tab-frame" id="frame-napol">
    <iframe src="napol.html?embed=1" id="iframe-napol" title="Напольные покрытия" loading="lazy"></iframe>
  </div>
</div>

<script>
// MAX Web App: сообщаем платформе что приложение готово
if (window.WebApp) { window.WebApp.ready(); }

var TABS = ['styazhka', 'shtukaturka', 'napol'];
var TITLES = {
  styazhka:    'Стяжка пола',
  shtukaturka: 'Штукатурка стен',
  napol:       'Напольные покрытия'
};

function showTab(tab) {
  TABS.forEach(function(t) {
    document.getElementById('frame-' + t).classList.toggle('active', t === tab);
    document.getElementById('tab-btn-' + t).classList.toggle('active', t === tab);
  });
  document.getElementById('header-title').textContent = TITLES[tab] || 'Калькуляторы ремонта';

  // Lazy-load iframe on first open
  var iframe = document.getElementById('iframe-' + tab);
  if (iframe && !iframe.src && iframe.dataset.src) {
    iframe.src = iframe.dataset.src;
  }
}
</script>
</body>
</html>
